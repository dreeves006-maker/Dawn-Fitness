<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dawn Fitness</title>
  <meta name="theme-color" content="#22c55e" />
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 16px 14px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.3px;
    }

    .subhead {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.95;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 14px;
    }

    .top-controls {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .top-controls-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .control-group select {
      min-width: 140px;
    }

    select, input {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }

    .week-summary {
      font-size: 14px;
      color: #cbd5e1;
      padding: 11px 14px;
      background: #111827;
      border-radius: 12px;
    }

    .tip-box {
      background: #1d4ed8;
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 14px;
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      position: sticky;
      top: 90px;
      z-index: 40;
      background: #0f172a;
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: bold;
      color: white;
      background: #334155;
      cursor: pointer;
      font-size: 14px;
    }

    .tab-btn.active {
      background: #22c55e;
      color: white;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }

    .day-panel {
      display: none;
    }

    .day-panel.active {
      display: block;
    }

    .day-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .day-accent {
      width: 14px;
      height: 54px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .accent-1 { background: #22c55e; }
    .accent-2 { background: #38bdf8; }
    .accent-3 { background: #f59e0b; }
    .accent-4 { background: #f472b6; }

    .day-title {
      margin: 0;
      font-size: 26px;
    }

    .day-subtitle {
      margin-top: 4px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .superset {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .superset-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .superset-title {
      margin: 0;
      font-size: 18px;
      color: #86efac;
    }

    .complete-btn {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      background: #334155;
      color: white;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .complete-btn.done {
      background: #16a34a;
    }

    .superset-note {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 10px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 9px 10px;
    }

    .exercise-block {
      margin-bottom: 16px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    .exercise-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      margin-bottom: 8px;
    }

    .progress-strip {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .progress-chip {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .progress-chip.active {
      background: #22c55e;
      color: white;
      border-color: #22c55e;
      font-weight: bold;
    }

    .set-grid {
      display: grid;
      grid-template-columns: 90px 1fr 1fr 70px;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .set-label {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: bold;
      background: #1e293b;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .set-check {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .set-check.done {
      background: #22c55e;
      color: white;
    }

    .history, .coaching {
      font-size: 13px;
      line-height: 1.4;
      border-radius: 10px;
      padding: 9px 10px;
      margin-top: 8px;
    }

    .history {
      background: #1e293b;
      color: #cbd5e1;
    }

    .coaching {
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-weight: bold;
    }

    .custom-wrap {
      margin-top: 8px;
    }

    .custom-wrap button {
      margin-top: 8px;
    }

    .save-btn {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .saved-message {
      display: none;
      margin-top: 10px;
      text-align: center;
      color: #86efac;
      font-size: 14px;
    }

    .timer-bar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: #22c55e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.25);
      z-index: 100;
    }

    .timer-display {
      font-size: 24px;
      font-weight: bold;
      min-width: 84px;
    }

    .timer-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .timer-buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: white;
      color: #16a34a;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .tabs {
        grid-template-columns: repeat(2, 1fr);
        top: 86px;
      }

      .exercise-row {
        grid-template-columns: 1fr;
      }

      .set-grid {
        grid-template-columns: 1fr;
      }

      .day-title {
        font-size: 22px;
      }

      .timer-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .timer-display {
        text-align: center;
      }

      .timer-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>💪 Dawn Fitness</h1>
    <div class="subhead">6-week plan • 4 days • manual set tracking • learns your exercises</div>
  </header>

  <div class="container">
    <div class="top-controls">
      <div class="top-controls-row">
        <div class="control-group">

        <div class="week-summary">

        </div>
      </div>
    </div>

    <div class="tip-box">
      Enter your exercises, weights, and reps for each set. The app remembers custom exercises, tracks progression, and moves you to the next day when you complete one.

    <div class="tabs" id="dayTabs"></div>
    <div id="app"></div>
  </div>

  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <div class="timer-buttons">
      <button onclick="startWorkout()">Start</button>
      <button onclick="pauseWorkout()">Pause</button>
      <button onclick="resetWorkout()">Reset</button>
    </div>
  </div>
