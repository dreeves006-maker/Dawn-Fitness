<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fit Tracker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 18px 16px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 30;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .subhead {
      font-size: 14px;
      font-weight: normal;
      margin-top: 6px;
      opacity: 0.95;
    }

    .container {
      padding: 16px;
      max-width: 950px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 16px;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 14px;
      border-radius: 16px;
    }

    .top-bar label {
      font-size: 14px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 6px;
    }

    .week-box select {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      min-width: 130px;
    }

    .tip-box {
      background: #1d4ed8;
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 18px;
      line-height: 1.45;
      font-size: 14px;
    }

    .days-wrap {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .day-card {
      background: #1e293b;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #334155;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .day-header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
    }

    .day-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .day-badge {
      width: 14px;
      height: 48px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .day-title-group h2 {
      margin: 0;
      font-size: 22px;
    }

    .day-subtitle {
      margin-top: 4px;
      color: #cbd5e1;
      font-size: 13px;
    }

    .day-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .day-content {
      padding: 0 16px 16px 16px;
      display: none;
      border-top: 1px solid #334155;
      background: #172131;
    }

    .day-card.active .day-content {
      display: block;
    }

    .day-card.active .day-toggle {
      background: #22c55e;
      color: white;
      border-color: #22c55e;
    }

    .superset {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .superset-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .superset h3 {
      margin: 0;
      color: #86efac;
      font-size: 17px;
    }

    .small-btn {
      background: #334155;
      color: white;
      border: none;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    .small-btn.done {
      background: #16a34a;
    }

    .exercise-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    select, input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
    }

    .history {
      font-size: 13px;
      color: #cbd5e1;
      margin: 2px 0 10px 0;
      background: #1e293b;
      padding: 9px 10px;
      border-radius: 10px;
      line-height: 1.35;
    }

    .save-btn {
      background: #22c55e;
      color: white;
      border: none;
      padding: 13px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      margin-top: 16px;
    }

    .saved-message {
      margin-top: 10px;
      color: #86efac;
      font-size: 14px;
      display: none;
      text-align: center;
    }

    .timer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #22c55e;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.25);
      z-index: 1000;
    }

    .timer-display {
      font-size: 22px;
      font-weight: bold;
      min-width: 72px;
    }

    .timer-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .timer-buttons button {
      padding: 9px 12px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #16a34a;
      font-weight: bold;
      cursor: pointer;
    }

    .accent-1 { background: #22c55e; }
    .accent-2 { background: #38bdf8; }
    .accent-3 { background: #f59e0b; }
    .accent-4 { background: #f472b6; }

    @media (max-width: 700px) {
      .exercise-row {
        grid-template-columns: 1fr;
      }

      .day-title-group h2 {
        font-size: 19px;
      }

      .timer-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .timer-display {
        text-align: center;
      }

      .timer-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    💪 My Fit Tracker
    <div class="subhead">6-week plan • 4 days per week • 5 supersets per day</div>
  </header>

  <div class="container">
    <div class="top-bar">
      <div class="week-box">
        <label for="weekSelect">Select week</label>
        <select id="weekSelect">
          <option value="1">Week 1</option>
          <option value="2">Week 2</option>
          <option value="3">Week 3</option>
          <option value="4">Week 4</option>
          <option value="5">Week 5</option>
          <option value="6">Week 6</option>
        </select>
      </div>
      <div style="color:#cbd5e1;font-size:14px;">
        Rep target: <strong id="repTarget">8</strong>
      </div>
    </div>

    <div class="tip-box">
      Each day is now in its own section. Tap a day to open it. Only one day opens at a time, so the screen feels much cleaner.
    </div>

    <div id="app" class="days-wrap"></div>
  </div>

  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <div class="timer-buttons">
      <button onclick="startWorkout()">Start</button>
      <button onclick="pauseWorkout()">Pause</button>
      <button onclick="resetWorkout()">Reset</button>
    </div>
  </div>

  <script>
    const exerciseOptions = [
      "Goblet Squat",
      "DB Romanian Deadlift",
      "DB Deadlift",
      "Reverse Lunge",
      "Walking Lunge",
      "Step Ups",
      "Glute Bridge",
      "Hip Thrust",
      "Bulgarian Split Squat",
      "Push Ups",
      "Incline Push Ups",
      "DB Chest Press",
      "DB Floor Press",
      "Incline DB Press",
      "Shoulder Press",
      "Arnold Press",
      "Lateral Raise",
      "Front Raise",
      "Bent Over Row",
      "One Arm Row",
      "Renegade Row",
      "Upright Row",
      "Chest Supported Row",
      "Pull Over",
      "Bicep Curl",
      "Hammer Curl",
      "Tricep Kickback",
      "Overhead Tricep Extension",
      "Plank",
      "Side Plank",
      "Dead Bug",
      "Bird Dog",
      "Russian Twist",
      "Mountain Climbers",
      "Leg Raises",
      "Sit Ups"
    ];

    const dayColors = ["accent-1", "accent-2", "accent-3", "accent-4"];
    const days = ["Day 1", "Day 2", "Day 3", "Day 4"];
    const supersetsPerDay = 5;
    const exercisesPerSuperset = 2;
    const app = document.getElementById("app");

    function getWeek() {
      return document.getElementById("weekSelect").value;
    }

    function getTargetReps(week) {
      if (week === "1" || week === "2") return 8;
      if (week === "3" || week === "4") return 10;
      return 12;
    }

    function getDayKey(week, dayIndex) {
      return `fitTracker-week${week}-day${dayIndex}`;
    }

    function getExerciseKey(exerciseName) {
      return `exerciseHistory-${exerciseName}`;
    }

    function getCompleteKey(week, dayIndex, supersetIndex) {
      return `complete-week${week}-day${dayIndex}-ss${supersetIndex}`;
    }

    function saveExerciseHistory(exerciseName, weight, reps) {
      if (!exerciseName) return;
      const history = {
        weight: weight || "",
        reps: reps || "",
        date: new Date().toLocaleDateString()
      };
      localStorage.setItem(getExerciseKey(exerciseName), JSON.stringify(history));
    }

    function getExerciseHistory(exerciseName) {
      if (!exerciseName) return null;
      const saved = localStorage.getItem(getExerciseKey(exerciseName));
      return saved ? JSON.parse(saved) : null;
    }

    function updateHistoryDisplay(dayIndex, supersetIndex, exerciseIndex) {
      const exerciseName = document.getElementById(`day-${dayIndex}-ss-${supersetIndex}-ex-${exerciseIndex}-name`)?.value || "";
      const historyBox = document.getElementById(`history-${dayIndex}-${supersetIndex}-${exerciseIndex}`);
      if (!historyBox) return;

      const history = getExerciseHistory(exerciseName);

      if (!exerciseName) {
        historyBox.textContent = "Last workout: none yet";
        return;
      }

      if (history) {
        historyBox.textContent = `Last workout: ${history.weight || "-"} kg, ${history.reps || "-"} reps on ${history.date}`;
      } else {
        historyBox.textContent = "Last workout: none yet";
      }
    }

    function toggleComplete(dayIndex, supersetIndex) {
      const week = getWeek();
      const key = getCompleteKey(week, dayIndex, supersetIndex);
      const current = localStorage.getItem(key) === "true";
      const newValue = !current;
      localStorage.setItem(key, newValue);

      const button = document.getElementById(`complete-btn-${dayIndex}-${supersetIndex}`);
      button.textContent = newValue ? "Completed ✓" : "Mark Complete";
      button.classList.toggle("done", newValue);
    }

    function loadCompleteState(dayIndex, supersetIndex) {
      const week = getWeek();
      const key = getCompleteKey(week, dayIndex, supersetIndex);
      const isDone = localStorage.getItem(key) === "true";
      const button = document.getElementById(`complete-btn-${dayIndex}-${supersetIndex}`);
      if (!button) return;

      button.textContent = isDone ? "Completed ✓" : "Mark Complete";
      button.classList.toggle("done", isDone);
    }

    function saveDay(dayIndex) {
      const week = getWeek();
      const dayData = [];

      for (let s = 0; s < supersetsPerDay; s++) {
        const supersetData = [];

        for (let e = 0; e < exercisesPerSuperset; e++) {
          const exerciseName = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-name`).value;
          const weight = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-weight`).value;
          const reps = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-reps`).value;

          supersetData.push({ exerciseName, weight, reps });
          saveExerciseHistory(exerciseName, weight, reps);
        }

        dayData.push(supersetData);
      }

      localStorage.setItem(getDayKey(week, dayIndex), JSON.stringify(dayData));

      const savedMessage = document.getElementById(`saved-message-${dayIndex}`);
      savedMessage.style.display = "block";
      savedMessage.textContent = "Saved successfully";

      setTimeout(() => {
        savedMessage.style.display = "none";
      }, 1800);

      for (let s = 0; s < supersetsPerDay; s++) {
        for (let e = 0; e < exercisesPerSuperset; e++) {
          updateHistoryDisplay(dayIndex, s, e);
        }
      }
    }

    function loadDay(dayIndex) {
      const week = getWeek();
      const saved = localStorage.getItem(getDayKey(week, dayIndex));
      if (!saved) return;

      const dayData = JSON.parse(saved);

      dayData.forEach((superset, s) => {
        superset.forEach((exercise, e) => {
          const nameEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-name`);
          const weightEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-weight`);
          const repsEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-reps`);

          if (nameEl) nameEl.value = exercise.exerciseName || "";
          if (weightEl) weightEl.value = exercise.weight || "";
          if (repsEl) repsEl.value = exercise.reps || "";
        });
      });
    }

    function createDropdown(dayIndex, supersetIndex, exerciseIndex) {
      const select = document.createElement("select");
      select.id = `day-${dayIndex}-ss-${supersetIndex}-ex-${exerciseIndex}-name`;

      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = "Select exercise";
      select.appendChild(defaultOption);

      exerciseOptions.forEach(exercise => {
        const option = document.createElement("option");
        option.value = exercise;
        option.textContent = exercise;
        select.appendChild(option);
      });

      select.addEventListener("change", () => {
        updateHistoryDisplay(dayIndex, supersetIndex, exerciseIndex);
      });

      return select;
    }

    function createInput(type, placeholder, id) {
      const input = document.createElement("input");
      input.type = type;
      input.placeholder = placeholder;
      input.id = id;
      return input;
    }

    function toggleDay(dayIndex) {
      document.querySelectorAll(".day-card").forEach((card, index) => {
        if (index === dayIndex) {
          card.classList.toggle("active");
        } else {
          card.classList.remove("active");
        }
      });
    }

    function renderApp() {
      const week = getWeek();
      const target = getTargetReps(week);
      document.getElementById("repTarget").textContent = target;
      app.innerHTML = "";

      days.forEach((dayName, dayIndex) => {
        const dayCard = document.createElement("div");
        dayCard.className = "day-card" + (dayIndex === 0 ? " active" : "");

        const dayHeader = document.createElement("div");
        dayHeader.className = "day-header";
        dayHeader.onclick = () => toggleDay(dayIndex);

        const left = document.createElement("div");
        left.className = "day-header-left";

        const badge = document.createElement("div");
        badge.className = `day-badge ${dayColors[dayIndex]}`;

        const titleGroup = document.createElement("div");
        titleGroup.className = "day-title-group";
        titleGroup.innerHTML = `
          <h2>${dayName}</h2>
          <div class="day-subtitle">Week ${week} • Target ${target} reps</div>
        `;

        const toggle = document.createElement("div");
        toggle.className = "day-toggle";
        toggle.textContent = "Open / Close";

        left.appendChild(badge);
        left.appendChild(titleGroup);
        dayHeader.appendChild(left);
        dayHeader.appendChild(toggle);

        const dayContent = document.createElement("div");
        dayContent.className = "day-content";

        for (let s = 0; s < supersetsPerDay; s++) {
          const supersetCard = document.createElement("div");
          supersetCard.className = "superset";

          const supersetHeader = document.createElement("div");
          supersetHeader.className = "superset-header";

          const supersetTitle = document.createElement("h3");
          supersetTitle.textContent = `Superset ${s + 1}`;

          const completeBtn = document.createElement("button");
          completeBtn.className = "small-btn";
          completeBtn.id = `complete-btn-${dayIndex}-${s}`;
          completeBtn.textContent = "Mark Complete";
          completeBtn.onclick = () => toggleComplete(dayIndex, s);

          supersetHeader.appendChild(supersetTitle);
          supersetHeader.appendChild(completeBtn);
          supersetCard.appendChild(supersetHeader);

          for (let e = 0; e < exercisesPerSuperset; e++) {
            const row = document.createElement("div");
            row.className = "exercise-row";

            const dropdown = createDropdown(dayIndex, s, e);
            const weightInput = createInput("number", "Weight", `day-${dayIndex}-ss-${s}-ex-${e}-weight`);
            const repsInput = createInput("number", `Reps (${target})`, `day-${dayIndex}-ss-${s}-ex-${e}-reps`);

            row.appendChild(dropdown);
            row.appendChild(weightInput);
            row.appendChild(repsInput);
            supersetCard.appendChild(row);

            const historyBox = document.createElement("div");
            historyBox.className = "history";
            historyBox.id = `history-${dayIndex}-${s}-${e}`;
            historyBox.textContent = "Last workout: none yet";
            supersetCard.appendChild(historyBox);
          }

          dayContent.appendChild(supersetCard);
        }

        const saveBtn = document.createElement("button");
        saveBtn.className = "save-btn";
        saveBtn.textContent = "Save Day";
        saveBtn.onclick = () => saveDay(dayIndex);
        dayContent.appendChild(saveBtn);

        const savedMessage = document.createElement("div");
        savedMessage.className = "saved-message";
        savedMessage.id = `saved-message-${dayIndex}`;
        dayContent.appendChild(savedMessage);

        dayCard.appendChild(dayHeader);
        dayCard.appendChild(dayContent);
        app.appendChild(dayCard);
      });

      days.forEach((_, dayIndex) => {
        loadDay(dayIndex);
        for (let s = 0; s < supersetsPerDay; s++) {
          loadCompleteState(dayIndex, s);
          for (let e = 0; e < exercisesPerSuperset; e++) {
            updateHistoryDisplay(dayIndex, s, e);
          }
        }
      });
    }

    document.getElementById("weekSelect").addEventListener("change", renderApp);

    let workoutTimer;
    let totalSeconds = 0;
    let running = false;

    function startWorkout() {
      if (running) return;
      running = true;
      workoutTimer = setInterval(() => {
        totalSeconds++;
        updateWorkoutDisplay();
      }, 1000);
    }

    function pauseWorkout() {
      running = false;
      clearInterval(workoutTimer);
    }

    function resetWorkout() {
      running = false;
      clearInterval(workoutTimer);
      totalSeconds = 0;
      updateWorkoutDisplay();
    }

    function updateWorkoutDisplay() {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      document.getElementById("timer").innerText =
        `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
    }

    updateWorkoutDisplay();
    renderApp();
  </script>
</body>
</html>
