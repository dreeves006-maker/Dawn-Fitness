<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Fit Coach</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
      padding-bottom: 100px;
    }

    header {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 16px 14px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .subhead {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.95;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 14px;
    }

    .top-controls {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .top-controls-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .control-group select {
      min-width: 140px;
    }

    select, input {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }

    .week-summary {
      font-size: 14px;
      color: #cbd5e1;
      padding: 11px 14px;
      background: #111827;
      border-radius: 12px;
    }

    .tip-box {
      background: #1d4ed8;
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 14px;
      line-height: 1.45;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      position: sticky;
      top: 86px;
      z-index: 40;
      background: #0f172a;
      padding-top: 4px;
      padding-bottom: 4px;
    }

    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      font-weight: bold;
      color: white;
      background: #334155;
      cursor: pointer;
      font-size: 14px;
    }

    .tab-btn.active {
      background: #22c55e;
      color: white;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }

    .day-panel {
      display: none;
    }

    .day-panel.active {
      display: block;
    }

    .day-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .day-accent {
      width: 14px;
      height: 54px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .accent-1 { background: #22c55e; }
    .accent-2 { background: #38bdf8; }
    .accent-3 { background: #f59e0b; }
    .accent-4 { background: #f472b6; }

    .day-title {
      margin: 0;
      font-size: 26px;
    }

    .day-subtitle {
      margin-top: 4px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .superset {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .superset-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .superset-title {
      margin: 0;
      font-size: 18px;
      color: #86efac;
    }

    .complete-btn {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      background: #334155;
      color: white;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .complete-btn.done {
      background: #16a34a;
    }

    .exercise-block {
      margin-bottom: 12px;
    }

    .exercise-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 8px;
    }

    .history,
    .coaching {
      font-size: 13px;
      line-height: 1.4;
      border-radius: 10px;
      padding: 9px 10px;
      margin-top: 6px;
    }

    .history {
      background: #1e293b;
      color: #cbd5e1;
    }

    .coaching {
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-weight: bold;
    }

    .save-btn {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .saved-message {
      display: none;
      margin-top: 10px;
      text-align: center;
      color: #86efac;
      font-size: 14px;
    }

    .timer-bar {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      background: #22c55e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      box-shadow: 0 -4px 14px rgba(0,0,0,0.25);
      z-index: 100;
    }

    .timer-display {
      font-size: 24px;
      font-weight: bold;
      min-width: 84px;
    }

    .timer-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .timer-buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: white;
      color: #16a34a;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .tabs {
        grid-template-columns: repeat(2, 1fr);
        top: 82px;
      }

      .exercise-row {
        grid-template-columns: 1fr;
      }

      .day-title {
        font-size: 22px;
      }

      .timer-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .timer-display {
        text-align: center;
      }

      .timer-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>💪 My Fit Coach</h1>
    <div class="subhead">6-week plan • 4 days per week • 5 supersets • coaching prompts built in</div>
  </header>

  <div class="container">
    <div class="top-controls">
      <div class="top-controls-row">
        <div class="control-group">
          <label for="weekSelect">Select week</label>
          <select id="weekSelect">
            <option value="1">Week 1</option>
            <option value="2">Week 2</option>
            <option value="3">Week 3</option>
            <option value="4">Week 4</option>
            <option value="5">Week 5</option>
            <option value="6">Week 6</option>
          </select>
        </div>

        <div class="week-summary">
          Current rep target: <strong id="repTarget">8</strong>
        </div>
      </div>
    </div>

    <div class="tip-box">
      Pick your week, then tap Day 1 to Day 4 above. Each week follows your 8 → 10 → 12 progression across 6 weeks.
    </div>

    <div class="tabs" id="dayTabs"></div>
    <div id="app"></div>
  </div>

  <div class="timer-bar">
    <div class="timer-display" id="timer">00:00</div>
    <div class="timer-buttons">
      <button onclick="startWorkout()">Start</button>
      <button onclick="pauseWorkout()">Pause</button>
      <button onclick="resetWorkout()">Reset</button>
    </div>
  </div>

  <script>
    const exerciseOptions = [
      "Goblet Squat",
      "DB Romanian Deadlift",
      "DB Deadlift",
      "Reverse Lunge",
      "Walking Lunge",
      "Step Ups",
      "Glute Bridge",
      "Hip Thrust",
      "Bulgarian Split Squat",
      "Push Ups",
      "Incline Push Ups",
      "DB Chest Press",
      "DB Floor Press",
      "Incline DB Press",
      "Shoulder Press",
      "Arnold Press",
      "Lateral Raise",
      "Front Raise",
      "Bent Over Row",
      "One Arm Row",
      "Renegade Row",
      "Upright Row",
      "Chest Supported Row",
      "Pull Over",
      "Bicep Curl",
      "Hammer Curl",
      "Tricep Kickback",
      "Overhead Tricep Extension",
      "Plank",
      "Side Plank",
      "Dead Bug",
      "Bird Dog",
      "Russian Twist",
      "Mountain Climbers",
      "Leg Raises",
      "Sit Ups"
    ];

    const days = ["Day 1", "Day 2", "Day 3", "Day 4"];
    const accents = ["accent-1", "accent-2", "accent-3", "accent-4"];
    const supersetsPerDay = 5;
    const exercisesPerSuperset = 2;
    let currentDayIndex = 0;

    const app = document.getElementById("app");
    const dayTabs = document.getElementById("dayTabs");
    const weekSelect = document.getElementById("weekSelect");

    function getWeek() {
      return weekSelect.value;
    }

    function getTargetReps(week) {
      if (week === "1" || week === "2") return 8;
      if (week === "3" || week === "4") return 10;
      return 12;
    }

    function getDayStorageKey(week, dayIndex) {
      return `fitcoach-week${week}-day${dayIndex}`;
    }

    function getCompleteStorageKey(week, dayIndex, supersetIndex) {
      return `fitcoach-week${week}-day${dayIndex}-superset${supersetIndex}-done`;
    }

    function getExerciseHistoryKey(exerciseName) {
      return `fitcoach-history-${exerciseName}`;
    }

    function saveExerciseHistory(exerciseName, weight, reps) {
      if (!exerciseName) return;

      const entry = {
        weight: weight || "",
        reps: reps || "",
        date: new Date().toLocaleDateString()
      };

      localStorage.setItem(getExerciseHistoryKey(exerciseName), JSON.stringify(entry));
    }

    function getExerciseHistory(exerciseName) {
      if (!exerciseName) return null;
      const saved = localStorage.getItem(getExerciseHistoryKey(exerciseName));
      return saved ? JSON.parse(saved) : null;
    }

    function getCoachingPrompt(exerciseName, repsValue, week) {
      const target = getTargetReps(week);

      if (!exerciseName) {
        return "Choose an exercise to get coaching guidance.";
      }

      const numericReps = Number(repsValue);

      if (!numericReps) {
        return `Aim for ${target} reps this week.`;
      }

      if (numericReps >= 12) {
        return "You hit 12 reps. Increase weight next time.";
      }

      if (numericReps >= 10 && target === 10) {
        return "Great. Next phase is 12 reps.";
      }

      if (numericReps >= 10 && target === 8) {
        return "You are above target. Increase weight if form feels strong.";
      }

      if (numericReps >= 8 && target === 8) {
        return "Good. Stay here or build slightly if form feels solid.";
      }

      if (numericReps >= target) {
        return "On target. Keep building steadily.";
      }

      return `Stay with this weight until you can hit ${target} reps.`;
    }

    function createDropdown(dayIndex, supersetIndex, exerciseIndex) {
      const select = document.createElement("select");
      select.id = `day-${dayIndex}-ss-${supersetIndex}-ex-${exerciseIndex}-name`;

      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = "Select exercise";
      select.appendChild(defaultOption);

      exerciseOptions.forEach(exercise => {
        const option = document.createElement("option");
        option.value = exercise;
        option.textContent = exercise;
        select.appendChild(option);
      });

      select.addEventListener("change", () => updateExerciseMeta(dayIndex, supersetIndex, exerciseIndex));
      return select;
    }

    function createInput(id, placeholder, dayIndex, supersetIndex, exerciseIndex) {
      const input = document.createElement("input");
      input.type = "number";
      input.id = id;
      input.placeholder = placeholder;
      input.addEventListener("input", () => updateExerciseMeta(dayIndex, supersetIndex, exerciseIndex));
      return input;
    }

    function updateExerciseMeta(dayIndex, supersetIndex, exerciseIndex) {
      const week = getWeek();
      const nameEl = document.getElementById(`day-${dayIndex}-ss-${supersetIndex}-ex-${exerciseIndex}-name`);
      const repsEl = document.getElementById(`day-${dayIndex}-ss-${supersetIndex}-ex-${exerciseIndex}-reps`);
      const historyEl = document.getElementById(`history-${dayIndex}-${supersetIndex}-${exerciseIndex}`);
      const coachingEl = document.getElementById(`coaching-${dayIndex}-${supersetIndex}-${exerciseIndex}`);

      if (!nameEl || !repsEl || !historyEl || !coachingEl) return;

      const exerciseName = nameEl.value;
      const repsValue = repsEl.value;
      const history = getExerciseHistory(exerciseName);

      if (history) {
        historyEl.textContent = `Last workout: ${history.weight || "-"} kg, ${history.reps || "-"} reps on ${history.date}`;
      } else {
        historyEl.textContent = "Last workout: none yet";
      }

      coachingEl.textContent = getCoachingPrompt(exerciseName, repsValue, week);
    }

    function toggleComplete(dayIndex, supersetIndex) {
      const week = getWeek();
      const key = getCompleteStorageKey(week, dayIndex, supersetIndex);
      const current = localStorage.getItem(key) === "true";
      const next = !current;
      localStorage.setItem(key, next);

      const btn = document.getElementById(`complete-btn-${dayIndex}-${supersetIndex}`);
      if (btn) {
        btn.textContent = next ? "Completed ✓" : "Mark Complete";
        btn.classList.toggle("done", next);
      }
    }

    function loadCompleteState(dayIndex, supersetIndex) {
      const week = getWeek();
      const key = getCompleteStorageKey(week, dayIndex, supersetIndex);
      const done = localStorage.getItem(key) === "true";
      const btn = document.getElementById(`complete-btn-${dayIndex}-${supersetIndex}`);
      if (btn) {
        btn.textContent = done ? "Completed ✓" : "Mark Complete";
        btn.classList.toggle("done", done);
      }
    }

    function saveDay(dayIndex) {
      const week = getWeek();
      const dayData = [];

      for (let s = 0; s < supersetsPerDay; s++) {
        const supersetData = [];

        for (let e = 0; e < exercisesPerSuperset; e++) {
          const exerciseName = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-name`).value;
          const weight = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-weight`).value;
          const reps = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-reps`).value;

          supersetData.push({ exerciseName, weight, reps });
          saveExerciseHistory(exerciseName, weight, reps);
        }

        dayData.push(supersetData);
      }

      localStorage.setItem(getDayStorageKey(week, dayIndex), JSON.stringify(dayData));

      const savedMessage = document.getElementById(`saved-message-${dayIndex}`);
      if (savedMessage) {
        savedMessage.style.display = "block";
        savedMessage.textContent = "Saved successfully";
        setTimeout(() => {
          savedMessage.style.display = "none";
        }, 1800);
      }

      for (let s = 0; s < supersetsPerDay; s++) {
        for (let e = 0; e < exercisesPerSuperset; e++) {
          updateExerciseMeta(dayIndex, s, e);
        }
      }
    }

    function loadDay(dayIndex) {
      const week = getWeek();
      const saved = localStorage.getItem(getDayStorageKey(week, dayIndex));
      if (!saved) return;

      const dayData = JSON.parse(saved);

      dayData.forEach((superset, s) => {
        superset.forEach((exercise, e) => {
          const nameEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-name`);
          const weightEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-weight`);
          const repsEl = document.getElementById(`day-${dayIndex}-ss-${s}-ex-${e}-reps`);

          if (nameEl) nameEl.value = exercise.exerciseName || "";
          if (weightEl) weightEl.value = exercise.weight || "";
          if (repsEl) repsEl.value = exercise.reps || "";
        });
      });
    }

    function renderTabs() {
      dayTabs.innerHTML = "";

      days.forEach((day, index) => {
        const btn = document.createElement("button");
        btn.className = "tab-btn" + (index === currentDayIndex ? " active" : "");
        btn.textContent = day;
        btn.onclick = () => switchDay(index);
        dayTabs.appendChild(btn);
      });
    }

    function switchDay(dayIndex) {
      currentDayIndex = dayIndex;

      document.querySelectorAll(".day-panel").forEach((panel, index) => {
        panel.classList.toggle("active", index === dayIndex);
      });

      document.querySelectorAll(".tab-btn").forEach((btn, index) => {
        btn.classList.toggle("active", index === dayIndex);
      });
    }

    function renderApp() {
      const week = getWeek();
      const target = getTargetReps(week);
      document.getElementById("repTarget").textContent = target;
      app.innerHTML = "";

      renderTabs();

      days.forEach((dayName, dayIndex) => {
        const panel = document.createElement("div");
        panel.className = "day-panel" + (dayIndex === currentDayIndex ? " active" : "");

        const dayCard = document.createElement("div");
        dayCard.className = "day-card";

        const dayHeader = document.createElement("div");
        dayHeader.className = "day-header";
        dayHeader.innerHTML = `
          <div class="day-accent ${accents[dayIndex]}"></div>
          <div>
            <h2 class="day-title">${dayName}</h2>
            <div class="day-subtitle">Week ${week} • Target ${target} reps</div>
          </div>
        `;
        dayCard.appendChild(dayHeader);

        for (let s = 0; s < supersetsPerDay; s++) {
          const superset = document.createElement("div");
          superset.className = "superset";

          const supersetHeader = document.createElement("div");
          supersetHeader.className = "superset-header";

          const title = document.createElement("h3");
          title.className = "superset-title";
          title.textContent = `Superset ${s + 1}`;

          const completeBtn = document.createElement("button");
          completeBtn.className = "complete-btn";
          completeBtn.id = `complete-btn-${dayIndex}-${s}`;
          completeBtn.textContent = "Mark Complete";
          completeBtn.onclick = () => toggleComplete(dayIndex, s);

          supersetHeader.appendChild(title);
          supersetHeader.appendChild(completeBtn);
          superset.appendChild(supersetHeader);

          for (let e = 0; e < exercisesPerSuperset; e++) {
            const block = document.createElement("div");
            block.className = "exercise-block";

            const row = document.createElement("div");
            row.className = "exercise-row";

            const dropdown = createDropdown(dayIndex, s, e);
            const weightInput = createInput(`day-${dayIndex}-ss-${s}-ex-${e}-weight`, "Weight", dayIndex, s, e);
            const repsInput = createInput(`day-${dayIndex}-ss-${s}-ex-${e}-reps`, `Target ${target}`, dayIndex, s, e);

            row.appendChild(dropdown);
            row.appendChild(weightInput);
            row.appendChild(repsInput);

            const history = document.createElement("div");
            history.className = "history";
            history.id = `history-${dayIndex}-${s}-${e}`;
            history.textContent = "Last workout: none yet";

            const coaching = document.createElement("div");
            coaching.className = "coaching";
            coaching.id = `coaching-${dayIndex}-${s}-${e}`;
            coaching.textContent = "Choose an exercise to get coaching guidance.";

            block.appendChild(row);
            block.appendChild(history);
            block.appendChild(coaching);
            superset.appendChild(block);
          }

          dayCard.appendChild(superset);
        }

        const saveBtn = document.createElement("button");
        saveBtn.className = "save-btn";
        saveBtn.textContent = "Save Day";
        saveBtn.onclick = () => saveDay(dayIndex);
        dayCard.appendChild(saveBtn);

        const savedMessage = document.createElement("div");
        savedMessage.className = "saved-message";
        savedMessage.id = `saved-message-${dayIndex}`;
        dayCard.appendChild(savedMessage);

        panel.appendChild(dayCard);
        app.appendChild(panel);
      });

      days.forEach((_, dayIndex) => {
        loadDay(dayIndex);
        for (let s = 0; s < supersetsPerDay; s++) {
          loadCompleteState(dayIndex, s);
          for (let e = 0; e < exercisesPerSuperset; e++) {
            updateExerciseMeta(dayIndex, s, e);
          }
        }
      });

      switchDay(currentDayIndex);
    }

    weekSelect.addEventListener("change", () => {
      renderApp();
    });

    let workoutTimer;
    let totalSeconds = 0;
    let running = false;

    function startWorkout() {
      if (running) return;
      running = true;

      workoutTimer = setInterval(() => {
        totalSeconds++;
        updateWorkoutDisplay();
      }, 1000);
    }

    function pauseWorkout() {
      running = false;
      clearInterval(workoutTimer);
    }

    function resetWorkout() {
      running = false;
      clearInterval(workoutTimer);
      totalSeconds = 0;
      updateWorkoutDisplay();
    }

    function updateWorkoutDisplay() {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      document.getElementById("timer").textContent =
        `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
    }

    updateWorkoutDisplay();
    renderApp();
  </script>
</body>
</html>
