<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Week Fit Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  background: #22c55e;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 15px;
}

select, input {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

.day {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.superset {
  background: #0f172a;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.exercise-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 6px;
}

.save-btn {
  background: #22c55e;
  padding: 10px;
  border: none;
  border-radius: 6px;
  width: 100%;
  margin-top: 10px;
  font-weight: bold;
}

.timer-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #22c55e;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.timer-buttons button {
  margin-left: 5px;
}

.progression {
  font-size: 12px;
  color: #86efac;
}

</style>
</head>

<body>

<header>
💪 6 Week Programme
<br>
<select id="weekSelect" onchange="renderApp()">
  <option value="1">Week 1</option>
  <option value="2">Week 2</option>
  <option value="3">Week 3</option>
  <option value="4">Week 4</option>
  <option value="5">Week 5</option>
  <option value="6">Week 6</option>
</select>
</header>

<div class="container" id="app"></div>

<div class="timer-bar">
  <div id="timer">60s</div>
  <div class="timer-buttons">
    <button onclick="startTimer(60)">60</button>
    <button onclick="startTimer(90)">90</button>
    <button onclick="startTimer(120)">120</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>

const exercises = [
"Squat","RDL","Lunge","Hip Thrust","Step Ups",
"Push Ups","DB Press","Incline Press",
"Shoulder Press","Arnold Press","Lateral Raise",
"Row","One Arm Row","Pull Over",
"Bicep Curl","Hammer Curl",
"Tricep Extension","Kickback",
"Plank","Dead Bug","Russian Twist"
];

const days = ["Day 1","Day 2","Day 3","Day 4"];

function getTargetReps(week){
  if(week == 1 || week == 2) return 8;
  if(week == 3 || week == 4) return 10;
  return 12;
}

function renderApp(){

  const app = document.getElementById("app");
  app.innerHTML = "";

  const week = document.getElementById("weekSelect").value;
  const target = getTargetReps(week);

  days.forEach((day, d)=>{

    const dayDiv = document.createElement("div");
    dayDiv.className = "day";

    dayDiv.innerHTML = `<h3>${day} - Target: ${target} reps</h3>`;

    for(let s=0; s<5; s++){

      const ss = document.createElement("div");
      ss.className = "superset";

      ss.innerHTML = `<strong>Superset ${s+1}</strong>`;

      for(let e=0; e<2; e++){

        const row = document.createElement("div");
        row.className = "exercise-row";

        const select = document.createElement("select");
        exercises.forEach(ex=>{
          const opt = document.createElement("option");
          opt.value = ex;
          opt.textContent = ex;
          select.appendChild(opt);
        });

        const weight = document.createElement("input");
        weight.placeholder = "kg";

        const reps = document.createElement("input");
        reps.placeholder = target;

        row.appendChild(select);
        row.appendChild(weight);
        row.appendChild(reps);

        ss.appendChild(row);
      }

      dayDiv.appendChild(ss);
    }

    const save = document.createElement("button");
    save.className = "save-btn";
    save.innerText = "Save Day";

    save.onclick = ()=>{
      localStorage.setItem(`week${week}-day${d}`, dayDiv.innerHTML);
      alert("Saved");
    };

    dayDiv.appendChild(save);
    app.appendChild(dayDiv);
  });

}

renderApp();

let timer;
let timeLeft = 60;

function startTimer(sec){
  clearInterval(timer);
  timeLeft = sec;

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft + "s";

    if(timeLeft<=0){
      clearInterval(timer);
      alert("Rest done");
    }
  },1000);
}

function resetTimer(){
  clearInterval(timer);
  timeLeft = 60;
  document.getElementById("timer").innerText = "60s";
}

</script>

</body>
</html>
